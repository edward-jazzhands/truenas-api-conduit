# TrueNAS API Conduit Configuration (TOML Format)
# ===================================================================
# All settings below start commented out (with a #). 
# To enable a setting, remove the # and modify the value for your setup.

# Configuration precedence (Highest priority to lowest):
#     1. CLI options            (Overrides everything else)
#     2. Environment variables
#     3. Config file
#     4. Secrets Manager
#     5. Docker Secrets
#     6. Default values         (Used if no other source is provided)

# NOTE: Settings marked (REQUIRED) have no default value. If they are 
# not supplied here, via an environment variable, or via the CLI, 
# the program will fail to start and display a validation error.

# See the documentation for more information on each setting:
# ! ADD LINK HERE WHEN READY

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# (REQUIRED) The address that you use to access the TrueNAS Web UI over HTTPS, 
# without the "https://" prefix.
# This MUST be the HTTPS address, not the HTTP address!
# You MUST have HTTPS enabled on the TrueNAS Web UI to use the TrueNAS API.
# If you use a port number (eg. its not 443), you must include it, for
# example: "192.168.1.xxx:8443".
#     Default: None
#     Equivalent Environment Var: TRUENAS_ADDRESS

# truenas_address = "192.168.1.xxx:8443"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# (REQUIRED) Your TrueNAS API key.
# WARNING: Storing API keys in plain text can be a security risk.
# Recommended to use the set-key command in the CLI (which utilizes your OS's 
# secrets manager), or use the --api-key option on the CLI which will prompt
# you for the key so that it's not stored anywhere. Additionally you can set
# the environment variable.
#     Default: None
#     Equivalent Environment Var: TRUENAS_API_KEY

# api_key = "1234567890"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# The address and socket port which the conduit will serve the HTTP REST 
# server on. This is how you use the sercvice. By default its set to localhost
# and an arbitrary port. Changing this to 0.0.0.0:<port> will allow the service
# to be accessed from from over the network.
#      Default: "localhost:4567"
#      Equivalent Environment Var: TRUENAS_CONDUIT_HOST

# conduit_host = "localhost:4567"

#  - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# The path to the TrueNAS certificate file. This is required if you want to use
# a self-signed certificate. If you use a certificate signed by a trusted CA,
# you can leave this blank. Alternatively, you can set validate_certs to false.
#     Default: None
#     Equivalent Environment Var: TRUENAS_CERT_PATH

# truenas_cert_path = "/path/to/your/cert.crt"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Set this to false to skip certificate validation. This is not recommended, as
# it's better to use a self-signed certificate. However, this does allow you to
# use this program without having a certificate on your machine.
#     Default: true
#     Equivalent Environment Var: TRUENAS_VALIDATE_CERTS

# validate_certs = true

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Setting log level is equivalent to using the --verbose flag on the CLI.
# -v = info, -vv = debug, -vvv = trace
# Options: [critical, error, warning, info, debug, trace]
#     Default: "warning"
#     Equivalent Environment Var: TRUENAS_LOG_LEVEL

# log_level = "warning"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# Set to true to disable color output. This is equivalent to using the
# --no-color flag on the CLI. NOTE: this does not affect the help menus.
# To disable color in the help menus, set the environment variable to anything.
# This is read directly by the program CLI framework (Rich-Click) as well as this
# program. This env var is a common convention and may affect other programs.
#     Default: false
#     Equivalent Environment Var: NO_COLOR

# no_color = false

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# You can set a request header to be required for all requests to the
# service. This can add an extra layer of security because scripts
# will need to know what the header is in order to send any command,
# (including stop, unlock, etc). Note this only applies to the service
# HTTP endpoints, not controlling it through the OS service manager.
# The included CLI will use this automatically if set.
#     Default: None
#     Equivalent Environment Var: TRUENAS_REQUEST_HEADER

# request_header = "My Request Header"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# In stealth mode, if the service is either locked or has a required
# request header, it will return a generic 404 response instead of
# a helpful error message. This can add an extra layer of security
# because if someone is somehow able to snoop on your open ports,
# they can't tell if the service is running or not.
#     Default: false
#     Equivalent Environment Var: TRUENAS_STEALTH_MODE

# stealth_mode = false

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# If start_locked is true, you'll be required to use your password
# to unlock the service. This is equivalent to using the --locked
# option on the CLI start command. If you're using the built-in file
# encryption to store your API key, and the password is not also
# stored on the server (.cryptkey file or TRUENAS_CRYPT_KEY env var),
# the service will start in locked mode automatically.
#     Default: false
#     Equivalent Environment Var: TRUENAS_START_LOCKED

# start_locked = false

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

# This is only intended for future-proofing, in case the API route ever 
# changes. This must match what your TrueNAS server currently uses.
#     Default: "/api/current"
#     Equivalent Environment Var: TRUENAS_API_ROUTE

# api_route = "/api/current"

# - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -
